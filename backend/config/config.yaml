# config/config.yaml - Updated for Level 3

app:
  name: "RAG Chatbot"
  version:  "3.0.0"
  environment: "production"
  log_level: "INFO"

# ==================== PATHS ====================
paths:
  data_dir: "data/documents"      # Changed to support multiple files
  db_dir: "chroma_db"
  log_file: "rag_system.log"
  metrics_file: "metrics.json"   # File to store metrics

# ==================== PDF PROCESSING ====================
pdf: 
  max_file_size_mb: 100
  allowed_extensions: [".pdf", ".PDF"]
  batch_size: 10                  # Process N files at a time
  skip_existing: true             # Skip if already in DB

# ==================== TEXT SPLITTING ====================
# Large chunk size for a documents with many letters (like a book, a article, a report, etc.)
# Small chunk size for a documents with few letters (like a email, a message, a short text, etc.)
# Large chunk overlap for a documents with many letters (like a book, a article, a report, etc.)
# Small chunk overlap for a documents with few letters (like a email, a message, a short text, etc.)
chunking:
  chunk_size:  500 #1200 # for a documents with many letters (like a book, a article, a report, etc.)
  chunk_overlap: 50 #250 # for a documents with many letters (like a book, a article, a report, etc.)
  separators: ["\n\n", "\n", ". ", " ", ""] # for a documents with many letters (like a book, a article, a report, etc.)
  add_metadata: true              # Add rich metadata to chunks

# ==================== EMBEDDINGS ====================
embeddings: 
  model_name: "paraphrase-multilingual-mpnet-base-v2" # all-MiniLM-L6-v2; all-mpnet-base-v2: for english text
  device: "cuda"
  normalize: true
  batch_size:  32                  # Batch embedding for speed

# ==================== VECTOR DATABASE ====================
vectordb:
  type: "chroma"
  collection_name: "documents"
  distance_metric: "cosine"
  
  chroma: 
    anonymized_telemetry: false
    allow_reset: true
  
  hnsw:
    space:  "cosine"
    construction_ef:  100
    search_ef: 100
    M: 16

# ==================== RETRIEVAL ====================
retrieval:
# mmr: Balance relevance (sự tương đồng) vs diversity (sự đa dạng). it gonna combine from Doc A, Doc B,.... to get the most relevant documents and response
# similarity: Balance relevance (sự tương đồng) vs diversity (sự đa dạng)
  search_type: "mmr"          # Changed to MMR for diversity; mmr: Maximum Marginal Relevance, use it when you want to retrieve the most relevant documents, 
  # similarity: "similarity"  # Similarity Search, use it when you want to retrieve the most similar documents
  k: 2 #4                        # Increased from 3; k: Number of documents to retrieve
  score_threshold: 0.6        # Score threshold; 0.0: No threshold, 1.0: All documents. If it too small, it gonna return with fake documents
  
  # Similarity configuration
  # similarity:
  #   k: 5                            # Increased from 3; k: Number of documents to retrieve
  #   score_threshold: 0.0            # Score threshold; 0.0: No threshold, 1.0: All documents 

  # MMR configuration
  mmr:
    fetch_k: 20                   # Fetch 20 candidates; fetch_k: Number of documents to fetch
    lambda_mult: 0.8              # Balance relevance vs diversity, 0.0: diversity (đa dạng), 1.0: relevance (chính xác tuyệt đối)
  
  # Rerank configuration
  rerank:                         # Re-ranking
    enabled: true                # Will implement later
    model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    top_n: 3

# ==================== LLM ====================
# provider: ollama (local) | gemini (Google AI)
# Đổi provider + model để chuyển:
#   Ollama: provider: ollama, model: llama3
#   Gemini: provider: gemini, model: gemini-2.5-flash
llm:
  provider: "ollama"
  model: "llama3"
  temperature: 0.1
  max_tokens: 2048
  top_p: 0.9
  top_k: 40
  repeat_penalty: 1.1
  
  ollama:
    base_url: "http://localhost:11434"
    timeout: 60
  
  gemini:
    # api_key: null   # null = use GOOGLE_API_KEY from .env
    max_output_tokens: null  # null = use llm.max_tokens

# ==================== PROMPT ====================
prompt:
  system_message: |
    You are a "Local Knowledge Assistant", a professional AI specializing in data analysis and synthesis through RAG architecture.
    Your ultimate task is to provide accurate, objective, and transparently cited answers based ENTIRELY on the provided documents.
    Always cross-reference with the Conversation History to correctly understand the user's intent and pronouns in their questions.
  
  rules:
    - "ABSOLUTELY loyal to the documents: Only use information present in the 'DOCUMENT CONTEXT'. Do not invent, speculate, or use outside knowledge (hallucination)."
    - "Handling missing information: If the documents do not contain enough information to answer, state honestly: 'I cannot find this information in the current documents'."
    - "Vertical Knowledge Linking: When the document provides direct information to answer, actively extract and present ADDITIONAL related information, consequences, classifications, or secondary context appearing AROUND the original document segment to enrich the answer."
    - "Understand conversation flow: Actively use 'CONVERSATION HISTORY' to clearly understand reference phrases (it, that, the above issue...) in the new question."
    - "Synthesize multiple sources: If information is scattered across multiple paragraphs or files, connect the knowledge blocks into a coherent explanation flow."
    - "Transparent citation: MANDATORY to attach source citations at the end of a sentence/paragraph when providing definitions, concepts, or parameters. Format: `[Filename]`."
    - "Visual presentation: Answer in natural language. Use Markdown formatting (bold, bullet points, tables) to break down explanation steps or code. Prioritize providing specific examples if mentioned in the documents."
  
  # Conversation-aware template
  conversation_template: |
    {system_message}
    
    MANDATORY RULES: 
    {rules}
    
    CONVERSATION HISTORY (Use to understand current context):
    {history}
    
    DOCUMENT CONTEXT (Absolute source of truth for answering): 
    {context}
    
    NEW QUESTION: {question}
    
    ASSISTANT'S ANSWER: 

# ==================== CHAT ====================
chat:
  show_sources: true
  max_query_length: 500
  history_enabled: true           # Enable conversation memory
  max_history:  8                  # Keep last 5 exchanges
  
  source_format: "detailed"       # detailed | compact | none
  
  messages:
    welcome:  " RAG Chatbot v3.0 đã sẵn sàng!"
    exit: " Tạm biệt!"
    processing: " Đang xử lý..."
    error: " Đã có lỗi xảy ra"

# ==================== LOGGING ====================
logging:
  level: "INFO"
  format:  "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  handlers:
    console:
      enabled: true
      level: "INFO"
    
    file:
      enabled: true
      level: "DEBUG"
      max_bytes: 10485760
      backup_count: 5

# ==================== METRICS ====================
metrics:                          
  enabled: true
  track: 
    - "query_count"
    - "response_time"
    - "retrieval_time"
    - "generation_time"
    - "avg_similarity_score"
  
  save_interval: 10               # Save every 10 queries